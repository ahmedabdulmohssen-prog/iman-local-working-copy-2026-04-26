openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: IMAN API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profile
    description: User profile and onboarding
  - name: transactions
    description: Financial transactions
  - name: insights
    description: AI-generated financial insights
  - name: plan
    description: Weekly financial plan
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get current user profile
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
    put:
      operationId: upsertProfile
      tags: [profile]
      summary: Create or update profile (onboarding)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List transactions
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Add a transaction manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions/{id}:
    delete:
      operationId: deleteTransaction
      tags: [transactions]
      summary: Delete a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /transactions/import:
    post:
      operationId: importTransactions
      tags: [transactions]
      summary: Import a batch of transactions (CSV upload). Categories are auto-assigned by AI.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportTransactionsBody"
      responses:
        "200":
          description: Imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportTransactionsResponse"

  /summary:
    get:
      operationId: getDashboardSummary
      tags: [insights]
      summary: Dashboard summary - income vs expenses, net cash flow, savings projection, category breakdown
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /insights:
    get:
      operationId: getInsights
      tags: [insights]
      summary: Get the latest AI-generated insights
      responses:
        "200":
          description: Insights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Insight"
    post:
      operationId: regenerateInsights
      tags: [insights]
      summary: Run AI analysis over the user's spending and generate new insights
      responses:
        "200":
          description: New insights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Insight"

  /plan:
    get:
      operationId: getWeeklyPlan
      tags: [plan]
      summary: Get the latest weekly financial plan
      responses:
        "200":
          description: Plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPlan"
    post:
      operationId: regenerateWeeklyPlan
      tags: [plan]
      summary: Regenerate the weekly financial plan with AI
      responses:
        "200":
          description: Plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPlan"

  /optimizations:
    get:
      operationId: getOptimizations
      tags: [insights]
      summary: Engineer Mode - ROI / long-term impact recommendations
      responses:
        "200":
          description: Optimizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Optimization"
    post:
      operationId: regenerateOptimizations
      tags: [insights]
      summary: Regenerate optimization recommendations with AI
      responses:
        "200":
          description: Optimizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Optimization"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Profile:
      type: object
      properties:
        userId:
          type: string
        incomeRange:
          type: ["string", "null"]
        monthlyIncome:
          type: ["number", "null"]
        monthlyExpensesEstimate:
          type: ["number", "null"]
        financialGoals:
          type: ["string", "null"]
        onboarded:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [userId, onboarded, createdAt, updatedAt]

    UpsertProfileBody:
      type: object
      properties:
        incomeRange:
          type: string
        monthlyIncome:
          type: number
        monthlyExpensesEstimate:
          type: number
        financialGoals:
          type: string

    Transaction:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        date:
          type: string
        description:
          type: string
        amount:
          type: number
          description: positive = income, negative = expense
        category:
          type: string
        source:
          type: string
          description: "manual or csv"
        createdAt:
          type: string
      required: [id, userId, date, description, amount, category, source, createdAt]

    CreateTransactionBody:
      type: object
      properties:
        date:
          type: string
        description:
          type: string
        amount:
          type: number
        category:
          type: string
      required: [date, description, amount]

    RawTransaction:
      type: object
      properties:
        date:
          type: string
        description:
          type: string
        amount:
          type: number
      required: [date, description, amount]

    ImportTransactionsBody:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/RawTransaction"
      required: [transactions]

    ImportTransactionsResponse:
      type: object
      properties:
        imported:
          type: integer
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
      required: [imported, transactions]

    CategoryBreakdown:
      type: object
      properties:
        category:
          type: string
        total:
          type: number
        count:
          type: integer
      required: [category, total, count]

    DashboardSummary:
      type: object
      properties:
        monthlyIncome:
          type: number
        monthlyExpenses:
          type: number
        netCashFlow:
          type: number
        savingsRate:
          type: number
          description: "Net cash flow / income, between -1 and 1"
        annualSavingsProjection:
          type: number
        topCategory:
          type: ["string", "null"]
        topCategoryAmount:
          type: number
        subscriptionsTotal:
          type: number
        transactionCount:
          type: integer
        categoryBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/CategoryBreakdown"
      required:
        - monthlyIncome
        - monthlyExpenses
        - netCashFlow
        - savingsRate
        - annualSavingsProjection
        - topCategoryAmount
        - subscriptionsTotal
        - transactionCount
        - categoryBreakdown

    Insight:
      type: object
      properties:
        id:
          type: integer
        kind:
          type: string
          description: "headline | warning | observation"
        title:
          type: string
        body:
          type: string
        amount:
          type: ["number", "null"]
        createdAt:
          type: string
      required: [id, kind, title, body, createdAt]

    WeeklyPlan:
      type: object
      properties:
        id:
          type: integer
        weekStart:
          type: string
        safeSpendingLimit:
          type: number
        suggestedSavings:
          type: number
        suggestedCuts:
          type: array
          items:
            type: string
        summary:
          type: string
        createdAt:
          type: string
      required: [id, weekStart, safeSpendingLimit, suggestedSavings, suggestedCuts, summary, createdAt]

    Optimization:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        rationale:
          type: string
        monthlyImpact:
          type: number
        annualImpact:
          type: number
        tenYearImpact:
          type: number
        confidence:
          type: number
          description: 0..1
        createdAt:
          type: string
      required: [id, title, rationale, monthlyImpact, annualImpact, tenYearImpact, confidence, createdAt]
